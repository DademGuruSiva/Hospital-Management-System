<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Appointment List</title>
    <link rel="stylesheet" th:href="@{/css/appointmentlist.css}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        /* Status Badge Colors */
        .status-badge.pending { color: #ff9800; font-weight: bold; background: #fff4e5; padding: 4px 8px; border-radius: 4px; }
        .status-badge.confirmed { color: #28a745; font-weight: bold; background: #e8f5e9; padding: 4px 8px; border-radius: 4px; }
        .status-badge.cancelled { color: #dc3545; font-weight: bold; background: #ffebee; padding: 4px 8px; border-radius: 4px; }
        
        /* Action Icon Styling */
        .action-icon { cursor: pointer; font-size: 18px; margin: 0 5px; text-decoration: none; }
        .check { color: #28a745; }
        .cancel { color: #dc3545; }
        .delete { color: #333; }
        .print { color: #1a3c6d; }
    </style>
</head>
<body>
    <div class="container">
        <h2 style="text-align: center; color: #1a3c6d;">Appointment List</h2>
        
        <div class="search-container">
            <input type="text" placeholder="Search by Patient / Doctor ID">
            <button type="submit"><i class="fa fa-search"></i></button>
        </div>

        <table class="appointment-table">
            <thead>
                <tr>
                    <th>S.I</th>
                    <th>Type</th>
                    <th>Patient</th>
                    <th>Doctor</th>
                    <th>Date</th>
                    <th>Time</th>
                    <th>Status</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="app, iter : ${appointments}">
                    <td th:text="${iter.count}">1</td>
                    
                    <td th:text="${app.patient != null ? 'Normal' : 'Quick'}" 
                        th:style="${app.patient != null ? 'color: #3498db; font-weight: bold;' : 'color: #e67e22; font-weight: bold;'}"></td>
                    
                    <td>
                        <div th:if="${app.patient != null}">
                            <b th:text="${app.patient.patientId}"></b><br>
                            <span th:text="${app.patient.firstName + ' ' + app.patient.lastName}"></span>
                        </div>
                        <div th:if="${app.patient == null}">
                            <b th:text="${app.patientName}"></b><br>
                            <span th:text="${app.patientPhone}"></span>
                        </div>
                    </td>

                    <td>
                        <b th:text="${app.doctor.doctorId}"></b><br>
                        <span th:text="${'DR ' + app.doctor.name}"></span>
                    </td>

                    <td th:text="${app.appointmentDate}"></td>
                    <td th:text="${app.appointmentTime}"></td>
                    
                    <td>
                        <span class="status-badge" 
                              th:text="${app.status}" 
                              th:classappend="${app.status == 'Pending' ? 'pending' : (app.status == 'Cancelled' ? 'cancelled' : 'confirmed')}">
                        </span>
                    </td>
                    
                    <td class="actions">
                        <a th:if="${app.status == 'Pending'}" 
                           th:href="@{'/approveAppointment/' + ${app.id}}" 
                           title="Confirm Appointment">
                            <i class="fa-regular fa-circle-check action-icon check"></i>
                        </a>

                        <a th:if="${app.status == 'Pending'}" 
                           th:href="@{'/cancelAppointment/' + ${app.id}}" 
                           title="Doctor Not Available / Cancel">
                            <i class="fa-regular fa-circle-xmark action-icon cancel"></i>
                        </a>

                        <a th:href="@{'/deleteAppointment/' + ${app.id}}" 
                           onclick="return confirm('Are you sure you want to delete this?')" 
                           title="Delete Appointment">
                            <i class="fa-solid fa-trash-can action-icon delete"></i>
                        </a>

                        <i class="fa-solid fa-print action-icon print" 
                           onclick="window.print()" 
                           title="Print List"></i>
                    </td>
                </tr>
            </tbody>
        </table>
        
        <div class="pagination-container" style="margin-top: 20px; text-align: center;">
             <span>Page 1 of 1</span>
             <button class="btn-next" style="background: #1a3c6d; color: white; border: none; padding: 5px 15px; border-radius: 4px; margin-left: 10px;">Next &rarr;</button>
        </div>
    </div>

    <script th:if="${showApprovePopup}">
        Swal.fire({ title: 'Approved!', text: '[[${successMsg}]]', icon: 'success', confirmButtonColor: '#1a3c6d' });
    </script>

    <script th:if="${showCancelPopup}">
        Swal.fire({ title: 'Cancelled!', text: 'Appointment status updated to Cancelled.', icon: 'error', confirmButtonColor: '#dc3545' });
    </script>
</body>
</html>
