<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Add/Edit Medicine - Hospital Management</title>
    <link rel="stylesheet" th:href="@{/css/pharmacy.css}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body style="background-color: #f0f2f5; font-family: 'Segoe UI', sans-serif;">

    <div class="pharmacy-container">
        <h2 class="form-header">
            <i class="fa-solid fa-prescription-bottle-medical"></i> 
            <span th:text="${medicine.id != null ? 'Update Medicine' : 'Add New Medicine'}"></span>
        </h2>
        
        <form th:action="@{/saveMedicine}" th:object="${medicine}" method="POST" class="pharmacy-form">
            
            <input type="hidden" th:field="*{id}">
            <input type="hidden" th:field="*{medicineId}">

            <div style="display: flex; gap: 20px;">
                <div style="flex: 2;">
                    <label>Medicine Name</label>
                    <input type="text" th:field="*{name}" placeholder="Enter medicine name" required>
                </div>
                <div style="flex: 1;">
                    <label>Batch Number</label>
                    <input type="text" th:field="*{batchNumber}" placeholder="Batch No" required>
                </div>
            </div>

            <div style="margin-bottom: 20px;">
                <label>Category</label>
                <select th:field="*{category}" style="width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #ced4da;">
                    <option value="Tablet">Tablet</option>
                    <option value="Syrup">Syrup</option>
                    <option value="Injection">Injection</option>
                    <option value="Capsule">Capsule</option>
                    <option value="Ointment">Ointment</option>
                </select>
            </div>

            <div style="display: flex; gap: 20px;">
                <div style="flex: 1;">
                    <label>Stock Quantity</label>
                    <input type="number" th:field="*{stockQuantity}" placeholder="0" required>
                </div>
                <div style="flex: 1;">
                    <label>Price per Unit (₹)</label>
                    <input type="number" step="0.01" th:field="*{pricePerUnit}" placeholder="0.00" required>
                </div>
                <div style="flex: 1;">
                    <label>Expiry Date</label>
                    <input type="date" th:field="*{expiryDate}" required>
                </div>
            </div>

            <button type="submit" class="btn-submit">
                <i class="fa-solid fa-save"></i> 
                <span th:text="${medicine.id != null ? 'Update Stock' : 'Save to Stock'}"></span>
            </button>
            
            <div style="text-align: center; margin-top: 15px;">
                <a th:href="@{/medicineList}" style="color: #666; text-decoration: none; font-size: 14px;">
                    <i class="fa-solid fa-arrow-left"></i> Back to Inventory
                </a>
            </div>
        </form>
    </div>

    <script th:if="${showPopup}">
        Swal.fire({
            title: 'Success!',
            text: '[[${successMsg}]]',
            icon: 'success',
            confirmButtonColor: '#1a3c6d'
        });
    </script>

</body>
</html>
