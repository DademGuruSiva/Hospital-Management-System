<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Hospital Management - Login</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body {
            /* Image hospital1.jpg  */
            background-image: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), 
                              url('/images/image.jpg'); 
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            height: 100vh;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', sans-serif;
        }

        .login-box {
            background: rgba(255, 255, 255, 0.95);
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.4);
            width: 350px;
            text-align: center;
        }

        .login-box h2 { color: #2c3e50; margin-bottom: 25px; }

        .input-group { margin-bottom: 20px; position: relative; }

        .input-group input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            box-sizing: border-box;
        }

        button {
            width: 100%;
            padding: 12px;
            background-color: #2b45a2;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
        }

        button:hover { background-color: #1a2a63; }

        .error-msg { color: #e74c3c; margin-top: 15px; }
    </style>
</head>
<body>

    <div class="login-box">
        <h2><i class="fas fa-hospital"></i> Hospital Login</h2>
        
        <form th:action="@{/login}" method="post" autocomplete="off">
            
            <div class="input-group">
                <input type="text" name="username" placeholder="Username" 
                       required autocomplete="new-username">
            </div>
            
            <div class="input-group">
                <input type="password" name="password" placeholder="Password" 
                       required autocomplete="new-password">
            </div>
            
            <button type="submit">Sign In</button>
        </form>

        <div th:if="${param.error}" class="error-msg">
            Invalid Username or Password!
        </div>
    </div>

</body>
</html>
