
<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Doctor List</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <style>
        .list-container { padding: 30px; font-family: sans-serif; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; background: #fff; }
        th, td { border: 1px solid #ddd; padding: 12px; text-align: left; }
        th { background-color: #2b45a2; color: white; }
        tr:nth-child(even) { background-color: #f2f2f2; }
    </style>
</head>
<body>
    <div class="list-container">
        <h2>All Registered Doctors</h2>
        <a th:href="@{/addDoctor}" style="display:inline-block; margin-bottom:15px; color:#2b45a2;">+ Add New Doctor</a>
        <table>
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Name</th>
                    <th>Specialization</th>
                    <th>Phone</th>
                    <th>Experience</th>
                    <th>Fee</th>
                    <th>Status</th>
                    <th>Actions</th> </tr>
            </thead>
            <tbody>
                <tr th:each="doc : ${doctors}">
                    <td th:text="${doc.doctorId}"></td>
                    <td th:text="${doc.name}"></td>
                    <td th:text="${doc.specialization}"></td>
                    <td th:text="${doc.phone}"></td>
                    <td th:text="${doc.experience}"></td>
                    <td th:text="${doc.consultationFee}"></td>
                    <td th:text="${doc.available ? 'Available' : 'Busy'}"></td>
                    <td style="white-space: nowrap;">
                        <a th:href="@{/editDoctor/{id}(id=${doc.id})}" 
                           style="padding: 6px 12px; background-color: #ffc107; color: black; text-decoration: none; border-radius: 4px; font-size: 13px; font-weight: bold; margin-right: 5px;">
                           Edit
                        </a>
                        
                        <a th:href="@{/deleteDoctor/{id}(id=${doc.id})}" 
                           style="padding: 6px 12px; background-color: #dc3545; color: white; text-decoration: none; border-radius: 4px; font-size: 13px; font-weight: bold;"
                           onclick="return confirm('Are you sure you want to delete this doctor?')">
                           Delete
                        </a>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>
</body>
</html>
